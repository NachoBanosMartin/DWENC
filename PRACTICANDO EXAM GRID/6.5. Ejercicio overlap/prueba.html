<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid overlap. Enunciado</title>
    <style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
    }

    .grid-container {
        display: grid;
        box-shadow: 0px 0px 10px 5px rgba(204, 204, 204, 1);
    }

    .text {
        background-color: white;
        padding: 0.5em;
        border: 3px solid red;
    }

    .image {
        display: block;
        max-width: 100%;
        aspect-ratio: 2/3;
        object-fit: cover;
    }

    @media (min-width: 600px){
        .grid-container{
            grid-template-columns: repeat(4, auto);
            grid-template-rows: 1fr auto 1fr;
        }

        .image{
            grid-area: 1 / 1 / -1 / 3;
        }

        .text{
            grid-area: 2 / 2 / 3 / -1;
            align-self: center;
        }
    }
    </style>
</head>

<body>
    <main>
        <h1>Grid overlap</h1>

        <div class="grid-container">
            <img class="image" src="https://picsum.photos/id/666/200/300" alt="image">
            <p class="text">Lorem ipsum dolor sit amet consectetur adipisicing elit. Aliquam veritatis repudiandae, ut soluta autem dolorum. Nesciunt dolore ipsum corporis modi magni labore voluptatibus, harum maiores!</p>
        </div>
    </main>
</body>

</html>
