<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="">Nombre del Pokémon</label><br><br>
        <input type="text" id="nombre"><br><br>
        <button onclick="mostrarPokemon()">Mostrar Pokémon</button>

        <div id="estadisticas">

        </div>
    </form>

    <script>
        function mostrarPokemon() {

            let nombreP = document.getElementById("nombre").value;

            fetch("https://pokeapi.co/api/v2/pokemon/" + nombreP)
            .then(res => res.json())
            .then(obj => {
                let titulo = document.createElement("h1");
                titulo.textContent = obj.name+" #"+obj.order; 
                
            })
        document.getElementById("estadisticas").innerHTML = "Nombre: " + obj.name; 
                
        }
    
    </script>
</body>
</html>
