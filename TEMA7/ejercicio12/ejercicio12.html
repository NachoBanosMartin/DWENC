<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="mostrarTodos()">Mostrar todos</button>
    <button onclick="mostrarMazdas()">Mazda</button>
    <button onclick="mostrarAzules()">Azules</button>
    <button onclick="mostrarElectricos()">Eléctricos</button>
    <button onclick="mostrarPrecioAscendente()">Precio Ascendente</button>
    <button onclick="mostrarPrecioDescendiente()">Precio Descendiente</button>
    <button onclick="mostrarPrecioRango()">Precio 20.000 a 30.000</button>
    <button onclick="mostrarToyotasHibridos()">Toyotas Híbridos</button>

    <div id="coches"></div>  
    
    <script>
        function mostrarTodos() {
            fetch("coches.json")
                .then(res => res.json())
                .then(coches => {
                    let html = "<ul>";
                    coches.forEach(coche => {
                        html += "<li>" +
                            coche.marca + " / " +
                            coche.modelo + " / " +
                            coche.color + " / " +
                            coche.tipo + " / " +
                            coche.precio + " €</li>";
                    });
                    html += "</ul>";
                    document.getElementById("coches").innerHTML = html;
                });
        }

        function mostrarMazdas() {
            fetch("coches.json")
                .then(res => res.json())
                .then(coches => {
                    let html = "<ul>";
                    coches.forEach(coche => {
                        if (coche.marca == "Mazda") {
                            html += "<li>" +
                                coche.marca + " / " +
                                coche.modelo + " / " +
                                coche.color + " / " +
                                coche.tipo + " / " +
                                coche.precio + " €</li>";
                        }
                    });
                    html += "</ul>";
                    document.getElementById("coches").innerHTML = html;
                });
        }

        function mostrarAzules() {
            fetch("coches.json")
                .then(res => res.json())
                .then(coches => {
                    let html = "<ul>";
                    coches.forEach(coche => {
                        if (coche.color == "Azul") {
                            html += "<li>" +
                                coche.marca + " / " +
                                coche.modelo + " / " +
                                coche.color + " / " +
                                coche.tipo + " / " +
                                coche.precio + " €</li>";
                        }
                    });
                    html += "</ul>";
                    document.getElementById("coches").innerHTML = html;
                });
        }

        function mostrarElectricos() {
            fetch("coches.json")
                .then(res => res.json())
                .then(coches => {
                    let html = "<ul>";
                    coches.forEach(coche => {
                        if (coche.tipo == "Eléctrico") {
                            html += "<li>" +
                                coche.marca + " / " +
                                coche.modelo + " / " +
                                coche.color + " / " +
                                coche.tipo + " / " +
                                coche.precio + " €</li>";
                        }
                    });
                    html += "</ul>";
                    document.getElementById("coches").innerHTML = html;
                });
        }

        function mostrarPrecioAscendente() {
            fetch("coches.json")
                .then(res => res.json())
                .then(coches => {
                    coches.sort((a, b) => a.precio - b.precio);
                    let html = "<ul>";
                    coches.forEach(coche => {
                        html += "<li>" +
                            coche.marca + " / " +
                            coche.modelo + " / " +
                            coche.color + " / " +
                            coche.tipo + " / " +
                            coche.precio + " €</li>";
                    });
                    html += "</ul>";
                    document.getElementById("coches").innerHTML = html;
                });
        }

        function mostrarPrecioDescendiente() {
            fetch("coches.json")
                .then(res => res.json())
                .then(coches => {
                    coches.sort((a, b) => b.precio - a.precio);
                    let html = "<ul>";
                    coches.forEach(coche => {
                        html += "<li>" +
                            coche.marca + " / " +
                            coche.modelo + " / " +
                            coche.color + " / " +
                            coche.tipo + " / " +
                            coche.precio + " €</li>";
                    });
                    html += "</ul>";
                    document.getElementById("coches").innerHTML = html;
                });
        }

        function mostrarPrecioRango() {
            fetch("coches.json")
                .then(res => res.json())
                .then(coches => {
                    let html = "<ul>";
                    coches.forEach(coche => {
                        if (coche.precio >= 20000 && coche.precio <= 30000) {
                            html += "<li>" +
                                coche.marca + " / " +
                                coche.modelo + " / " +
                                coche.color + " / " +
                                coche.tipo + " / " +
                                coche.precio + " €</li>";
                        }
                    });
                    html += "</ul>";
                    document.getElementById("coches").innerHTML = html;
                });
        }

        function mostrarToyotasHibridos() {
            fetch("coches.json")
                .then(res => res.json())
                .then(coches => {
                    let html = "<ul>";
                    coches.forEach(coche => {
                        if (coche.marca == "Toyota" && coche.tipo == "Hibrido") {
                            html += "<li>" +
                                coche.marca + " / " +
                                coche.modelo + " / " +
                                coche.color + " / " +
                                coche.tipo + " / " +
                                coche.precio + " €</li>";
                        }
                    });
                    html += "</ul>";
                    document.getElementById("coches").innerHTML = html;
                });
        }
</script>
</body>
</html>
