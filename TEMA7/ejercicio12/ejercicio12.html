    <div id="coches"></div>  
    
    <script>
        function mostrarTodos(){
            fetch("coches.json")
            .then(respuesta => respuesta.json())
            .then(objeto => {
                let lista = "<ul>";
                    objeto.forEach(element => {
                        lista += "<li>" + element + "</li>";
                    });
            
                lista += "</ul>";
            
                document.getElementById("coches").innerHTML = lista;
            }); 
        }

        function mostrarMazdas(){
            fetch("coches.json")
            .then(respuesta => respuesta.json())
            .then(objeto => {
                if(objeto.marca == "Mazda"){
                    for (let i = 0; i < objeto.length; i++) { 
                        let lista = "<ul>";
                            objeto.forEach(element => {
                                lista += "<li>" + element + "</li>";
                    });
            
                    lista += "</ul>";
            
                    document.getElementById("coches").innerHTML = lista;
                }
                }
            }); 
        }

    </script>
</body>
