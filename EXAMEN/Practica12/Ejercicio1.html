<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Cargar un mensaje externo</h2>
    <button onclick="cargarTexto()">Cargar mensaje</button>
    <div id="resultado"></div>
    <script>
        /*
        1. Crea una página web con un botón que, al pulsarlo, 
        cargue el contenido de un fichero mensaje.txt y lo muestre en la página sin recargarla.

            0	No iniciada
            1	Conexión abierta
            2	Petición recibida
            3	Procesando
            4	Completada
        */

        function cargarTexto() {
            let peticion = new XMLHttpRequest();
            peticion.open("GET", "mensaje.txt", true);
            peticion.onreadystatechange = function () {
                if (peticion.readyState === 4 && peticion.status === 200) {
                    document.getElementById("resultado").innerHTML = peticion.responseText;
                }
            };
            peticion.send();
        }
    </script>
</body>
</html>
