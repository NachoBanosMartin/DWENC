<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="caja" style="width:300px;height:300px;background:lightgrey;"></div>
    <script>
        /*
        3. Carga un fichero de texto con Fetch y muéstralo directamente dentro de un <div>.
        */
        fetch("mensaje.txt")
        .then(respuesta => respuesta.text())
        .then(texto => document.getElementById("caja").innerHTML = texto);
    </script>
</body>
</html>
