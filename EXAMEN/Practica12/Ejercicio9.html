<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="resultado"></div>
    <script>
        /*
        9. Carga el fichero precios.json con varios precios y calcula el total.
        */
        fetch("precios.json")
        .then(res => res.json())
        .then(precios => {
            let total = 0;
            for (let i = 0; i < precios.length; i++) {
                total += precios[i];
            }
            document.getElementById("resultado").innerHTML = "Total: " + total + " €";
        });
    </script>
</body>
</html>
