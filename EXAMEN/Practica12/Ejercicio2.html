<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="cargaPagina('p_inicio.html')">Inicio</button>
    <button onclick="cargaPagina('p_servicios.html')">Servicios</button>
    <button onclick="cargaPagina('p_contacto.html')">Contacto</button>

    <div id="caja"></div>

    <script>
        /*
        2.Usando XMLHttpRequest, carga distintas páginas HTML dentro de un contenedor sin recargar la página. 
        Las páginas son: p_inicio.html,  p_servicios.html y p_contacto.html.
        */

        function cargaPagina(pagina) {
        let xhr = new XMLHttpRequest();
        xhr.open('GET', pagina, true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState == 4 && xhr.status == 200) {
                document.getElementById('caja').innerHTML = xhr.responseText;
            }
        };
        xhr.send();
        }
    </script>
</body>
</html>
