<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
        7. El usuario introduce un número de filas.
            Al pulsar un botón, genera una tabla con tantas filas como el número que se indique.
        */
        function generarTabla(){
            let numero = parseInt(document.getElementById("numero").value);
            tabla = document.getElementById("tabla");
            tabla.innerHTML = "";

            for(let i = 1; i <= numero; i++){
                let fila = document.createElement("tr");
                let celda = document.createElement("td");
                celda.innerHTML = "Fila " + i;
                fila.appendChild(celda);
                tabla.appendChild(fila);
            }
        }
    </script>
    <label for="numero">Numero de filas:</label>
    <input type="number" id="numero" name="numero"><br>
    <button id="generar" onclick="generarTabla()">Generar tabla</button>
    <table id="tabla" border="1"></table>
</body>
</html>
