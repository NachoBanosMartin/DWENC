<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img src="perro.png" width="100">
    <img src="gato.jpg" width="100">
    <img src="conejo.jpg" width="100">
    <img src="coche.png" width="100">
    <img src="moto.jpg" width="100">
    <script>
        /*
        18. Crea una galería de imágenes donde al pasar el ratón sobre una imagen, se agrande.
        */

        let imagenes = document.getElementsByTagName("img");

        for (let i = 0; i < imagenes.length; i++) {
            imagenes[i].addEventListener("mouseover", function () {
                this.style.width = "300px";
            });

            imagenes[i].addEventListener("mouseout", function () {
                this.style.width = "100px";
            });
        }
    </script>
</body>
</html>
