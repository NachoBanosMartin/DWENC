<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="pulsar">Pulsa</button>
    <p id="cantidad"></p>
    <script>
        /*
        14. Usando lo visto en eventos, 
        crea un botón que muestre cuántas veces ha sido pulsado.
        */
        let contador = 0;
        document.getElementById("pulsar").addEventListener("click", function(){
            contador++;
            document.getElementById("cantidad").innerHTML = contador;
        })
    </script>
</body>
</html>
