<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>
<body>
    <script>
      //CREAR COOKIE
    document.cookie ="user=Juan; expires=Thu, 18 Jun 2026 12:00:00 UTC; path=/;";

      //ACCEDER A LA COOKIE Y MOSTRARLA
    function leerCookie(nombre) {
        let cookies = document.cookie.split(";"); // Divide la cadena de cookies en un array
        for (let i = 0; i < cookies.length; i++) {
          let cookie = cookies[i].trim(); // Elimina espacios en blanco al principio y al final

            if (cookie.startsWith(nombre + "=")) {
                return cookie.substring(nombre.length + 1); // Devuelve el valor de la cookie
            }
        }
        return null; // Si no se encuentra la cookie, devuelve null
    }

    let nombreCookie = leerCookie("user");
      console.log(nombreCookie); // Muestra el valor en la consola
    </script>
</body>
</html>
